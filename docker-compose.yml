version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: napolitan-api
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - napolitan-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: napolitan-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-napolitan}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-napolitan}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - napolitan-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: napolitan-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - napolitan-network
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: napolitan-backup
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-napolitan}
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    entrypoint: ['sh', '/backup.sh']
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - napolitan-network
    restart: 'no'
    # Note: Run manually or via external scheduler (e.g., cron, Kubernetes CronJob)
    # Example: docker-compose run --rm backup

networks:
  napolitan-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
